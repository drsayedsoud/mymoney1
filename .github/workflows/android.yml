name: Build Android APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Find Project Directory and Build
        run: |
          # البحث تلقائياً عن المجلد الذي يحتوي على ملفات أندرويد وبنائه
          PROJECT_PATH=$(find . -name "settings.gradle.kts" | head -n 1 | xargs dirname)
          echo "Project found at: $PROJECT_PATH"
          cd "$PROJECT_PATH"
          gradle wrapper --gradle-version 8.4
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: "**/build/outputs/apk/debug/app-debug.apk"
